{% for sport in sports %}
<label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-white/5 cursor-pointer transition-colors">
    <input type="checkbox" value="{{ sport }}" checked onchange="onSportChange()"
        class="accent-secondary rounded border-gmp-border w-3.5 h-3.5">
    <span class="text-xs text-gmp-text-menu">{{ sport }}</span>
</label>
{% else %}
<div class="px-3 py-2 text-xs text-gmp-text-faint italic">No sports in feed</div>
{% endfor %}
