{% for comp in competitions %}
<label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-white/5 cursor-pointer transition-colors">
    <input type="checkbox" value="{{ comp | e }}" {% if comp in selected_competitions %}checked{% endif %}
        onchange="onFeederCompetitionChange()" class="accent-secondary rounded border-slate-600 w-3.5 h-3.5">
    <span class="text-xs text-slate-300">{{ comp }}</span>
</label>
{% endfor %}
{% if not competitions %}
<p class="text-[10px] text-slate-500 italic px-3 py-2">Select sport and category first</p>
{% endif %}
