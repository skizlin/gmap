{# Event Navigator notes modal – screen-only; not related to Feeder Events notes #}
<div class="p-6">
    <h3 class="text-lg font-semibold text-gmp-text-heading mb-1">Notes <span class="text-gmp-text-faint font-normal text-xs">(Event Navigator)</span></h3>
    <p class="text-xs text-gmp-text-muted mb-4">Domain event: {{ event_label | e }} — for this screen only.</p>

    <div class="p-3 rounded-lg bg-gmp-surface/60 border border-gmp-border">
        <label class="block text-xs font-medium text-gmp-text-muted mb-2">Note</label>
        <textarea id="en-note-text" rows="4" placeholder="Type a note for this event…"
            class="w-full rounded border border-gmp-border bg-gmp-surface text-gmp-text-heading text-sm p-2 focus:ring-2 focus:ring-primary/50 placeholder-gmp-text-faint mb-2">{{ note_text }}</textarea>
        <label class="flex items-start gap-2 mt-2 mb-2 cursor-pointer">
            <input type="checkbox" id="en-note-requires-confirmation" class="rounded border-warning/50 bg-gmp-surface-raised text-warning mt-0.5 accent-warning">
            <span class="text-xs text-warning/90">IMPORTANT! Please confirm you read and understood!</span>
        </label>
        <p class="text-[11px] text-gmp-text-faint mb-3">If checked, all users will see a notification (top right) until they confirm they have read it.</p>
        <div class="flex gap-2">
            <button type="button" id="en-note-save-btn" onclick="enNoteSave()" class="px-3 py-1.5 rounded text-xs font-medium bg-primary text-white hover:bg-primaryHover">Save</button>
            <button type="button" onclick="closeModal()" class="px-3 py-1.5 rounded text-xs font-medium bg-surfaceHover text-gmp-text hover:bg-gmp-border">Cancel</button>
        </div>
    </div>
</div>

<script>
(function () {
    window.enNoteDomainEventId = {{ domain_event_id | tojson }};
})();
function enNoteSave() {
    var text = (document.getElementById('en-note-text') && document.getElementById('en-note-text').value) || '';
    var domainEventId = window.enNoteDomainEventId;
    if (!domainEventId) return;
    var form = new FormData();
    form.append('domain_event_id', domainEventId);
    form.append('note_text', text);
    var cb = document.getElementById('en-note-requires-confirmation');
    form.append('requires_confirmation', (cb && cb.checked) ? '1' : '0');
    var btn = document.getElementById('en-note-save-btn');
    if (btn) btn.disabled = true;
    fetch('/api/event-navigator/notes', { method: 'POST', body: form })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data && data.ok) {
                var body = document.getElementById('domain-events-body');
                if (body) htmx.trigger(body, 'domainEventsReload');
                closeModal();
            }
        })
        .finally(function () {
            if (btn) btn.disabled = false;
        });
}
</script>
