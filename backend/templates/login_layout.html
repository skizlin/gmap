<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sign in — GMP{% endblock %}</title>
    {% include "includes/gmp_tailwind_head.html" %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body class="bg-darkbg text-gmp-text font-sans min-h-screen flex flex-col">
    <header class="border-b border-gmp-border-subtle px-4 py-3 shrink-0">
        <span class="text-lg font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">GMP</span>
    </header>
    <main class="flex-1 flex flex-col p-6">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
